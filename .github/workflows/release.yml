name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Install pkg
        run: npm install -g pkg

      - name: Build (pkg)
        run: npm run build:pkg

      - name: Prepare artifacts (rename)
        shell: bash
        run: |
          mkdir -p release
          ls -la dist || true

          # Windows
          if compgen -G "dist/*win*.exe" > /dev/null; then
            cp dist/*win*.exe release/3d-smarthome-converter-win.exe
          fi

          # Linux
          if compgen -G "dist/*linux*" > /dev/null; then
            cp dist/*linux* release/3d-smarthome-converter-linux
          fi

          # macOS (x64/arm64)
          if compgen -G "dist/*macos*x64*" > /dev/null; then
            cp dist/*macos*x64* release/3d-smarthome-converter-macos-x64
          fi
          if compgen -G "dist/*macos*arm64*" > /dev/null; then
            cp dist/*macos*arm64* release/3d-smarthome-converter-macos-arm64
          fi

          ls -la release

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
